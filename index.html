<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alerta Verde AI</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

input, button {
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: green;
  color: white;
  cursor: pointer;
}

.panel {
  background: #1e293b;
  margin: 10px auto;
  padding: 15px;
  width: 300px;
  border-radius: 10px;
}

.falla {
  border: 2px solid red;
  animation: parpadeo 1s infinite;
}

@keyframes parpadeo {
  0% { background-color: #7f1d1d; }
  50% { background-color: #b91c1c; }
  100% { background-color: #7f1d1d; }
}
</style>
</head>

<body>

<h1>🌱 Alerta Verde AI</h1>

<h2>🚨 Alertas: <span id="contador">0</span></h2>

<h2>📥 Agregar panel</h2>

<input id="panel" placeholder="ID">
<input id="ubicacion" placeholder="Ubicación">
<input id="temperatura" placeholder="Temp">
<input id="voltaje" placeholder="Voltaje">
<input id="corriente" placeholder="Corriente">
<input id="eficiencia" placeholder="Eficiencia">

<br>
<button onclick="agregarPanel()">➕ Agregar Panel</button>
<button onclick="analizarTodo()">🚀 Analizar Todos</button>

<h2>📋 Paneles cargados</h2>
<div id="lista"></div>

<h2>🚨 Resultados</h2>
<div id="resultados"></div>

<script>

if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

let paneles = [];
let totalAlertas = 0;

// Agregar panel
function agregarPanel() {
  const p = {
    panel: document.getElementById("panel").value,
    ubicacion: document.getElementById("ubicacion").value,
    temp: parseFloat(document.getElementById("temperatura").value),
    volt: parseFloat(document.getElementById("voltaje").value),
    corr: parseFloat(document.getElementById("corriente").value),
    eff: parseFloat(document.getElementById("eficiencia").value)
  };

  paneles.push(p);

  const div = document.createElement("div");
  div.className = "panel";
  div.innerHTML = `Panel ${p.panel} - ${p.ubicacion}`;
  document.getElementById("lista").appendChild(div);
}

// Analizar todos
function analizarTodo() {

  document.getElementById("resultados").innerHTML = "";

  paneles.forEach(p => {

    let estado = "Normal";

    if (p.eff < 50 || p.volt < 20 || p.temp > 60) {
      estado = "Falla";
    }

    let energia = estado === "Falla" ? (Math.random()*15+5) : (Math.random()*2);
    let costo = energia * 0.15;
    let reparacion = estado === "Falla" ? (Math.random()*150+50) : 0;

    if (estado === "Falla") {
      totalAlertas++;
      document.getElementById("contador").innerText = totalAlertas;

      new Notification("🚨 Falla detectada", {
        body: `Panel ${p.panel} - ${p.ubicacion}`
      });

      new Audio("https://www.soundjay.com/buttons/beep-01a.mp3").play();
    }

    const div = document.createElement("div");
    div.className = "panel " + (estado === "Falla" ? "falla" : "");

    div.innerHTML = `
      <h3>Panel ${p.panel}</h3>
      <p>${p.ubicacion}</p>
      <p style="color:${estado === "Falla" ? "red" : "lightgreen"}">${estado}</p>
      <p>⚡ ${energia.toFixed(2)} kWh</p>
      <p>💸 $${costo.toFixed(2)}</p>
      <p>🔧 $${reparacion.toFixed(2)}</p>
    `;

    document.getElementById("resultados").appendChild(div);
  });
}

</script>

</body>
</html>
