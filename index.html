<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alerta Verde AI</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

.header {
  background: #020617;
  padding: 20px;
  text-align: center;
}

.kpis {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px;
}

.kpi {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

.form {
  text-align: center;
}

input, button {
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: green;
  color: white;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  width: 320px;
  border-radius: 10px;
}

.falla {
  border: 2px solid red;
  animation: parpadeo 0.8s infinite;
}

@keyframes parpadeo {
  0% { background: #1e293b; }
  50% { background: #7f1d1d; }
  100% { background: #1e293b; }
}

.alta { color: red; }
.media { color: orange; }
.baja { color: lightgreen; }

</style>
</head>

<body>

<div class="header">
  <h1>🌱 Alerta Verde AI</h1>
  <p>Monitoreo inteligente con análisis de garantía</p>
</div>

<div class="kpis">
  <div class="kpi">⚡ Producción: <span id="prod">0</span> kWh</div>
  <div class="kpi">🚨 Alertas: <span id="alert">0</span></div>
</div>

<div class="form">
  <input id="id" placeholder="ID">
  <input id="ubi" placeholder="Ubicación">
  <input id="temp" placeholder="Temp">
  <input id="volt" placeholder="Voltaje">
  <input id="corr" placeholder="Corriente">
  <input id="eff" placeholder="Eficiencia">

  <br>
  📅 Fecha instalación:
  <input type="date" id="instalacion">

  <br>
  <button onclick="add()">➕ Agregar</button>
  <button onclick="run()">🚀 Analizar</button>
</div>

<div class="grid" id="grid"></div>

<script>

let data = [];

function add(){
  data.push({
    id: id.value,
    u: ubi.value,
    t: +temp.value,
    v: +volt.value,
    c: +corr.value,
    e: +eff.value,
    f: new Date(instalacion.value)
  });
  alert("Panel agregado");
}

function run(){

  grid.innerHTML = "";

  let prod = 0;
  let alertas = 0;

  let hoy = new Date();

  data.forEach(p => {

    let estado = "Normal";
    let tipo = "";
    let motivo = "";
    let reco = "";
    let prioridad = "baja";

    // FALLAS
    if(p.e < 50){
      estado="Falla";
      tipo="🔻 Baja eficiencia";
      motivo="Conversión baja";
      reco="Limpiar o revisar daño";
      prioridad="alta";
    }

    if(p.t > 60){
      estado="Falla";
      tipo="🔥 Sobrecalentamiento";
      motivo="Alta temperatura";
      reco="Ventilación";
      prioridad="media";
    }

    if(p.v < 20){
      estado="Falla";
      tipo="⚡ Caída producción";
      motivo="Voltaje bajo";
      reco="Revisar conexión";
      prioridad="alta";
    }

    if(p.v == 0){
      estado="Falla";
      tipo="🧱 Panel desconectado";
      motivo="Sin energía";
      reco="Reconectar";
      prioridad="alta";
    }

    if(p.e < 60 && p.t < 50){
      tipo="🌫️ Suciedad";
      motivo="Bloqueo solar";
      reco="Limpiar panel";
    }

    // 🛡️ GARANTÍA AUTOMÁTICA (5 años)
    let años = (hoy - p.f) / (1000*60*60*24*365);
    let enGarantia = años <= 5;

    let energia = estado==="Falla" ? Math.random()*10+5 : Math.random()*10+10;
    let costo = energia*0.15;
    let reparacion = estado==="Falla" ? Math.random()*200+50 : 0;

    let garantiaMsg = "";
    if(enGarantia && estado==="Falla"){
      reparacion = 0;
      garantiaMsg="🛡️ Garantía activa";
      reco="Contactar proveedor";
    } else if(estado==="Falla"){
      garantiaMsg="❌ Sin garantía";
    }

    let fecha = new Date().toLocaleString();

    if(estado==="Falla") alertas++;

    prod += energia;

    let card = document.createElement("div");
    card.className = estado==="Falla" ? "card falla" : "card";

    card.innerHTML = `
      <h3>Panel ${p.id}</h3>
      <p>📍 ${p.u}</p>
      <p>🕒 ${fecha}</p>
      <p>📅 Instalación: ${p.f.toLocaleDateString()}</p>

      <p><b>${estado}</b></p>
      <p>${tipo}</p>

      ${estado==="Falla" ? `
        <p class="${prioridad}">⚠️ Prioridad: ${prioridad}</p>
        <p>❓ ${motivo}</p>
        <p>💡 ${reco}</p>
        <p>${garantiaMsg}</p>
      ` : ""}

      <hr>

      <p>⚡ Producción: ${energia.toFixed(2)} kWh</p>
      <p>💸 Pérdida: $${costo.toFixed(2)}</p>
      <p>🔧 Reparación: $${reparacion.toFixed(2)}</p>
    `;

    grid.appendChild(card);

  });

  prod.innerText = prod.toFixed(2);
  alert.innerText = alertas;
}

</script>

</body>
</html>
